version: '3.8'

services:

  redis-master:
    image: redis:7.0
    container_name: redis-master
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --loglevel notice
    volumes:
      - redis-master-data:/data
    networks:
      - redis-network

  redis-replica-1:
    image: redis:7.0
    container_name: redis-replica-1
    ports:
      - "6380:6379"
    command: redis-server --replicaof redis-master 6379 --appendonly yes
    depends_on:
      - redis-master
    volumes:
      - redis-replica1-data:/data
    networks:
      - redis-network

  redis-replica-2:
    image: redis:7.0
    container_name: redis-replica-2
    ports:
      - "6381:6379"
    command: redis-server --replicaof redis-master 6379 --appendonly yes
    depends_on:
      - redis-master
    volumes:
      - redis-replica2-data:/data
    networks:
      - redis-network

volumes:
  redis-master-data:
  redis-replica1-data:
  redis-replica2-data:

networks:
  redis-network:
    driver: bridge